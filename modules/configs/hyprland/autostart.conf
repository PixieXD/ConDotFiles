exec-once = hyprctl setcursor KanadeCursors 50 # Cursor
exec-once = waypaper --restore # Wallpaper
exec-once = systemctl --user start hyprpolkitagent # Start polkit agent
exec-once = waybar # Open up waybar
exec-once = copyq --start-server # start copyq
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY _CURRENT_DESKTOP
exec-once = swayosd-server
exec-once = systemctl --user import-environment QT_QPA_PLATFORMTHEME # Apply QT theme for XDPH